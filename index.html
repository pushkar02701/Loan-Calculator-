<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>Loan Calculator</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="container">
			<h1>Loan Calculator</h1>
			<p>
				Loan Amount $
				<input
					class="input loan-amount"
					type="number"
					min="99"
					max="499999"
					placeholder="Enter Your Amount."
				/>
			</p>
			<p>
				Rate of Interest %
				<input
					class="input interest-rate"
					type="number"
					min="2"
					max="100"
					placeholder="Enter The ROI"
					step=".1"
				/>
			</p>
			<p>
				Months to pay
				<input
					class="input months-to-pay"
					type="number"
					min="6"
					max="60"
					placeholder="Enter The MOP"
				/>
			</p>
			<button onclick="calculateLoan()">
				Calculate Monthly Payment
			</button>
			<p class="payment">Monthly Payment:</p>
		</div>

		<script src="index.js"></script>
	</body>
</html>
